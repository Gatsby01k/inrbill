name: quality
on:
  pull_request:
  push:
    branches: [main, codex/inrp2p-v2]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:validate
        env:
          DATABASE_URL: postgresql://user:pass@127.0.0.1:5432/inrp2p
          DATABASE_URL_UNPOOLED: postgresql://user:pass@127.0.0.1:5432/inrp2p
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@127.0.0.1:5432/inrp2p
          DATABASE_URL_UNPOOLED: postgresql://user:pass@127.0.0.1:5432/inrp2p
          NEXT_PUBLIC_SITE_URL: https://inrp2p.com
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: build-placeholder
          TURNSTILE_SECRET_KEY: build-placeholder
          RESEND_API_KEY: build-placeholder
          EMAIL_FROM: INRP2P <build@inrp2p.com>
